<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Fun Facts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        h1 {
            color: #333;
        }

        #fact {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #555;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 Random Fun Fact</h1>
    <p id="fact">Click the button to see a fun fact!</p>
    <button onclick="showFact()">Show Fun Fact</button>
</div>

<script>
    const facts = [
        "Honey never spoils.",
        "Bananas are berries, but strawberries are not.",
        "Octopuses have three hearts.",
        "A day on Venus is longer than a year on Venus.",
        "Sharks existed before trees.",
        "The Eiffel Tower can grow taller in summer due to heat expansion.",
        "Wombats produce cube-shaped poop.",
        "There are more stars in the universe than grains of sand on Earth.",
        "A group of flamingos is called a flamboyance.",
        "The human brain contains about 86 billion neurons."
    ];

    function showFact() {
        const randomIndex = Math.floor(Math.random() * facts.length);
        document.getElementById("fact").textContent = facts[randomIndex];
    }
</script>

</body>
</html>
